author: FranFkntastic
name: ComplicatedMarketBoard
repo_url: https://github.com/FranFkntastic/ComplicatedMarketBoard
punchline: A compact Dalamud market board helper for FFXIV.
description: |
  A compact market board helper with quick item lookup, sortable tables, configurable market scopes, and clearer Universalis freshness information.

  Highlights:
    - Search from hover, hotkey, clipboard, or item name
    - Compare prices by world, data center, or region
    - Sort and resize market tables
    - View retainer names, buyer names, market freshness, and market velocity when available
tags:
  - Marketboard
  - Price
  - Data
  - Universalis
  - FranFkntastic
category_tags:
  - Utility
  - Other

